<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业死亡螺旋 · 16个恶性循环</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>⭕ 死亡螺旋 · 16案例</h2>
            <p style="font-size:0.75rem; color:#3f6286; margin-top:6px;">个体理性 → 集体崩坏</p>
        </div>
        <ul class="case-list" id="caseList"></ul>
        <div class="sidebar-footer">
            <span>本站由 <a href="http://www.seachange.chat" target="_blank">SeaChange</a> 开发</span>
        </div>
    </div>

    <div class="main-panel" id="mainPanel">
        <div class="case-header">
            <div class="case-title" id="displayTitle">低质低价竞争螺旋</div>
            <div id="displayDesc" style="color:#2b4c73; line-height:1.6; margin-top:12px;"></div>
            <div class="case-threshold" id="displayThreshold"></div>
        </div>

        <div class="graph-label">
            <h3>⥁ 循环情境示意图</h3>
            <span class="zoom-hint">🐭 滚轮缩放 | 鼠标拖拽 | 双击重置</span>
        </div>

        <div class="canvas-container">
            <canvas id="cycleCanvas" width="900" height="500"></canvas>
        </div>
        <div class="reset-zoom">
            <button id="resetZoomBtn">↺ 重置视图</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
